# Nginx WAF Rules Template
# Security rules for the reverse proxy

# Block common attack patterns
if ($request_uri ~* "(?:union.*select|insert.*into|drop.*table|delete.*from)") {
    set $waf_rule "SQL Injection detected in URI";
    return 403;
}

if ($request_uri ~* "(?:<script|javascript:|on\w+\s*=)") {
    set $waf_rule "XSS attempt detected";
    return 403;
}

if ($request_uri ~* "\.\./\.\./") {
    set $waf_rule "Directory traversal detected";
    return 403;
}

# Block suspicious User-Agents
if ($http_user_agent ~* "(?:nikto|sqlmap|nmap|masscan)") {
    set $waf_rule "Suspicious scanner detected";
    return 403;
}

# Block large request bodies
if ($request_body_size > 10485760) {
    set $waf_rule "Request body exceeds maximum size (10MB)";
    return 413;
}
