scrape_configs:
  - job_name: nginx-metrics
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'localhost:9115'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.+):(\d+)'
        replacement: '${1}'

  - job_name: node-exporter
    static_configs:
      - targets:
          - 'localhost:9100'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.+):(\d+)'
        replacement: '${1}'

  - job_name: grafana
    static_configs:
      - targets:
          - 'localhost:3000'
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.+):(\d+)'
        replacement: '${1}'
