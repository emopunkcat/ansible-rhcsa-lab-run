[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
python_classes = ["Test*"]
addopts = "-v --tb=short"

[tool.black]
line-length = 100
target-version = ["py38"]
exclude = "(\.eggs|\.git|\.hg|\.mypy_cache|\.tox|\.venv|venv|_build|buck-out|build|dist)"

[tool.flake8]
max-line-length = 100
max-complexity = 18
select = "B,C,E,F,W,T4,B9"
ignore = "E203,E501,W503"
exclude = "(\.eggs|\.git|\.hg|\.mypy_cache|\.tox|\.venv|venv|_build|buck-out|build|dist)"
