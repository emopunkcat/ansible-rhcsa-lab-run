# Ansible RHEL9 Cluster Security Playbooks - Inventory Configuration
# Edit this file with your actual host details before running playbooks

[cluster]
# Web server cluster (main nginx reverse proxy nodes)
web1.example.com ansible_host=192.168.1.10 ansible_user=root ansible_become=yes
web2.example.com ansible_host=192.168.1.11 ansible_user=root ansible_become=yes
web3.example.com ansible_host=192.168.1.12 ansible_user=root ansible_become=yes

# Add more hosts as needed:
# web4.example.com ansible_host=192.168.1.13 ansible_user=root ansible_become=yes
# web5.example.com ansible_host=192.168.1.14 ansible_user=root ansible_become=yes

[monitoring]
# Monitoring infrastructure (Prometheus, Grafana, AlertManager)
prometheus.example.com ansible_host=192.168.1.20 ansible_user=root ansible_become=yes
grafana.example.com ansible_host=192.168.1.21 ansible_user=root ansible_become=yes
alertmanager.example.com ansible_host=192.168.1.22 ansible_user=root ansible_become=yes

[log_aggregation]
# Centralized logging (ELK stack, Fluentd, or similar)
elk.example.com ansible_host=192.168.1.30 ansible_user=root ansible_become=yes
logstash.example.com ansible_host=192.168.1.31 ansible_user=root ansible_become=yes
kibana.example.com ansible_host=192.168.1.32 ansible_user=root ansible_become=yes

[backend]
# Backend application servers (optional - for load balancing)
app1.example.com ansible_host=192.168.1.40 ansible_user=root ansible_become=yes
app2.example.com ansible_host=192.168.1.41 ansible_user=root ansible_become=yes
app3.example.com ansible_host=192.168.1.42 ansible_user=root ansible_become=yes

[secrets]
# Vault/Secrets management (HashiCorp Vault, etc.)
vault.example.com ansible_host=192.168.1.50 ansible_user=root ansible_become=yes

# Group aliases for common operations
all:
  children: cluster, monitoring, log_aggregation, backend, secrets

web_cluster:
  children: cluster

monitoring_stack:
  children: monitoring, log_aggregation

production:
  children: cluster, monitoring, backend

staging:
  children: cluster, monitoring

# Consolidated variables for all host groups
[cluster:vars]
ansible_python_interpreter=/usr/bin/python3
nginx_version=1.24.0
fail2ban_enabled=true
prometheus_enabled=false
grafana_enabled=false
elk_enabled=false
ssl_enabled=true
hsts_max_age=31536000
log_level=warn
monitoring_enabled=true
rate_limit_burst=20
api_rate_limit_burst=10
geo_blocking_enabled=true
backend_servers=["127.0.0.1:8001","127.0.0.1:8002","127.0.0.1:8003"]
ssl_certificate=/etc/nginx/ssl/cert.pem
ssl_key=/etc/nginx/ssl/key.pem
ssl_chain=/etc/nginx/ssl/chain.pem
fail2ban_maxretry=3
fail2ban_findtime=600
fail2ban_bantime=3600
sysctl_net_ipv4_tcp_syncookies=1
sysctl_net_ipv4_tcp_max_syn_backlog=4096
sysctl_kernel_randomize_va_space=2
nginx_worker_processes=auto
nginx_worker_connections=1024
nginx_keepalive_timeout=65
health_check_endpoint=/health
health_check_interval=30s
health_check_timeout=5s
log_retention_days=30
log_rotation_max_size=100M
log_rotation_count=5
security_audit_enabled=true
security_audit_log_path=/var/log/security-audit.log
deployment_environment=production
deployment_version=1.0.0
deployment_date="{{ ansible_date_time.iso8601 }}"

[monitoring:vars]
prometheus_port=9090
grafana_port=3000
alertmanager_port=9093
webhook_url=http://webhook.example.com/alerts
slack_channel=#alerts-critical
pagerduty_integration_enabled=false
