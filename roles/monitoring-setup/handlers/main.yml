---
# Handlers for monitoring-setup role

- name: Restart grafana
  ansible.builtin.systemd:
    name: grafana-server
    state: restarted

- name: Restart alertmanager
  ansible.builtin.systemd:
    name: alertmanager
    state: restarted

- name: Restart prometheus
  ansible.builtin.systemd:
    name: prometheus
    state: restarted
