---
# Monitoring setup role tasks
# Installs Prometheus client libraries, configures metrics endpoints, Grafana, and AlertManager

- name: Install monitoring packages
  ansible.builtin.package:
    name:
      - python3-prometheus-client
      - python3-psutil
      - python3-jsonschema
    state: present
  when: prometheus_enabled

- name: Install prometheus-node-exporter
  ansible.builtin.package:
    name: prometheus-node-exporter
    state: present
  when: node_exporter_enabled

- name: Install grafana
  ansible.builtin.package:
    name: grafana
    state: present
  when: grafana_enabled

- name: Create metrics endpoint directory
  ansible.builtin.file:
    path: /var/lib/nginx_metrics
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create metrics exporter script
  ansible.builtin.copy:
    content: |
      #!/usr/bin/env python3
      from prometheus_client import Counter, Gauge, Histogram, start_http_server
      import time
      import psutil

      nginx_requests = Counter(
          'nginx_requests_total',
          'Total HTTP requests',
          ['method', 'status', 'endpoint']
      )
      nginx_connections = Gauge(
          'nginx_connections_active',
          'Active connections',
          ['state']
      )
      nginx_duration = Histogram(
          'nginx_request_duration_seconds',
          'Request duration',
          ['endpoint']
      )

      def update_metrics():
          cpu = psutil.cpu_percent(interval=1)
          memory = psutil.virtual_memory()
          nginx_connections.set(cpu / 100.0)

      start_http_server({{ prometheus_port }})
      while True:
          update_metrics()
          time.sleep(15)
    dest: /usr/local/bin/nginx-metrics-exporter
    owner: root
    group: root
    mode: "0755"

- name: Create prometheus configuration directory
  ansible.builtin.file:
    path: /etc/prometheus
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Prometheus scrape configuration
  ansible.builtin.copy:
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s
        external_labels:
          cluster: "rhcsa-lab-runner"
          environment: "{{ deployment_environment | default('production') }}"

      scrape_configs:
        - job_name: 'nginx-metrics'
          static_configs:
            - targets: ['localhost:{{ prometheus_port }}']
          metrics_path: '{{ prometheus_metrics_path }}'

        - job_name: 'node-exporter'
          static_configs:
            - targets: ['localhost:{{ node_exporter_port }}']

        {% if fail2ban_metrics_enabled %}
        - job_name: 'fail2ban-metrics'
          static_configs:
            - targets: ['localhost:{{ fail2ban_metrics_port }}']
        {% endif %}
    dest: /etc/prometheus/scrape.yml
    owner: root
    group: root
    mode: "0644"

- name: Deploy Grafana Prometheus datasource
  ansible.builtin.copy:
    content: |
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: {{ grafana_datasource_url }}
          isDefault: true
          editable: true
    dest: /etc/grafana/provisioning/datasources/prometheus.yml
    owner: root
    group: root
    mode: "0640"
  when: grafana_enabled
  notify: Restart grafana

- name: Deploy Grafana dashboard
  ansible.builtin.copy:
    content: |
      {
        "annotations": {"list": []},
        "editable": true,
        "fiscalYearStartMonth": 0,
        "graphTooltip": 0,
        "id": null,
        "links": [],
        "panels": [
          {
            "datasource": "Prometheus",
            "fieldConfig": {"defaults": {}, "overrides": []},
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
            "id": 1,
            "options": {},
            "targets": [
              {"datasource": "Prometheus", "expr": "rate(nginx_requests_total[5m])", "refId": "A"}
            ],
            "title": "Request Rate",
            "type": "timeseries"
          },
          {
            "datasource": "Prometheus",
            "fieldConfig": {"defaults": {}, "overrides": []},
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
            "id": 2,
            "targets": [
              {"datasource": "Prometheus", "expr": "nginx_connections_active", "refId": "A"}
            ],
            "title": "Active Connections",
            "type": "timeseries"
          }
        ],
        "refresh": "5s",
        "schemaVersion": 38,
        "style": "dark",
        "tags": ["nginx", "security", "rhcsa"],
        "templating": {"list": []},
        "time": {"from": "now-1h", "to": "now"},
        "title": "Nginx Security Dashboard",
        "uid": "nginx-security-dashboard",
        "version": 1
      }
    dest: /etc/grafana/provisioning/dashboards/nginx-security.json
    owner: root
    group: root
    mode: "0640"
  when: grafana_enabled
  notify: Restart grafana

- name: Deploy AlertManager configuration
  ansible.builtin.copy:
    content: |
      global:
        smtp_smarthost: 'smtp.example.com:587'
        smtp_from: 'alerts@example.com'
        smtp_require_tls: true
        slack_api_url: '{{ slack_api_url }}'

      route:
        receiver: 'default'
        group_by: ['alertname', 'cluster']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        routes:
          - match:
              severity: critical
            receiver: 'critical-alerts'
            continue: true
          - match:
              severity: warning
            receiver: 'warning-alerts'

      receivers:
        - name: 'default'
          webhook_configs:
            - send_resolved: true
              url: '{{ webhook_url | default("http://webhook.example.com/alerts") }}'
        - name: 'critical-alerts'
          slack_configs:
            - api_url: '{{ slack_api_url }}'
              channel: '{{ slack_channel }}'
              send_resolved: true
        - name: 'warning-alerts'
          slack_configs:
            - api_url: '{{ slack_api_url }}'
              channel: '#alerts-warning'
              send_resolved: true
    dest: /etc/alertmanager/config.yml
    owner: root
    group: root
    mode: "0644"
  when: alertmanager_enabled
