---
# Nginx Reverse Proxy Role - Full Configuration with Security Hardening
# Implements SSL/TLS, rate limiting, WAF rules, geo-blocking, and comprehensive headers

- name: Deploy Complete Nginx Reverse Proxy Configuration
  hosts: cluster
  become: true
  vars_files:
    - ../inventory.ini
  environment:
    ANSIBLE_CALLBACK_PLUGINS: ansible.builtin.profile_tasks

  tasks:
    # Install nginx if not present
    - name: Ensure nginx is installed
      ansible.builtin.package:
        name: nginx
        state: present

    # Create nginx configuration directory
    - name: Ensure nginx config directory exists
      ansible.builtin.file:
        path: /etc/nginx/conf.d
        state: directory
        owner: root
        group: root
        mode: '0755'

    # Deploy main nginx.conf with full security headers
    - name: Deploy nginx main configuration
      ansible.builtin.template:
        src: ../templates/nginx.conf.j2
        dest: /etc/nginx/nginx.conf
        owner: root
        group: root
        mode: '0644'

    # Deploy upstream configuration for backend services
    - name: Create upstream configuration directory
      ansible.builtin.file:
        path: /etc/nginx/upstream.d
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Deploy upstream configuration
      ansible.builtin.copy:
        content: |
          # Upstream configuration for backend services
          # Add backend servers as needed

          upstream backend_servers {
              least_conn;  # Load balancing strategy

              server 127.0.0.1:8001 weight=5 max_fails=3 fail_timeout=30s;
              server 127.0.0.1:8002 weight=3 max_fails=3 fail_timeout=30s;
              server 127.0.0.1:8003 weight=2 max_fails=3 fail_timeout=30s backup;

              # Keep-alive connections
              keepalive 32;
              keepalive_timeout 60s;
              keepalive_requests 100;
          }

          # Health check endpoint upstream
          upstream health_checks {
              server 127.0.0.1:8080 max_fails=1 fail_timeout=5s;
          }

        dest: /etc/nginx/upstream.d/backend.conf
        owner: root
        group: root
        mode: '0644'

    # Deploy SSL certificates directory
    - name: Create SSL certificates directory
      ansible.builtin.file:
        path: /etc/nginx/ssl
        state: directory
        owner: root
        group: root
        mode: '0700'

    - name: Configure SSL certificate permissions
      ansible.builtin.file:
        path: /etc/nginx/ssl
        owner: root
        group: root
        mode: '0700'
        recurse: true

    # Deploy rate limiting configuration
    - name: Create rate limiting zone
      ansible.builtin.copy:
        content: |
          # Rate limiting zone - 10MB limit, ~10k requests
          limit_conn_zone $binary_remote_addr zone=addr:10m;
          limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;

          # More aggressive rate limiting for API endpoints
          limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

          # Geo-blocking zone
          geo $blocked_countries {
              # Add high-risk countries here
              # Example: RU, CN, IR, KP (customize based on compliance requirements)
          }

        dest: /etc/nginx/rate-limit.conf
        owner: root
        group: root
        mode: '0644'

    # Deploy WAF (Web Application Firewall) configuration
    - name: Create WAF rules directory
      ansible.builtin.file:
        path: /etc/nginx/waf
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Deploy ModSecurity-style WAF rules
      ansible.builtin.copy:
        content: |
          # WAF Rules for nginx
          # Implements OWASP Core Rule Set concepts

          # Block SQL injection patterns
          if ($request_uri ~* "(union|select|insert|update|delete|drop|create).*from.*[\"']?\s*[a-z0-9_]+") {
              return 403;
          }

          # Block XSS attempts
          if ($request_uri ~* "<script[^>]*>.*</script>") {
              return 403;
          }

          # Block path traversal
          if ($request_uri ~* "\.\./|\.\.\\") {
              return 403;
          }

          # Block command injection
          if ($request_uri ~* "[;&|`]") {
              return 403;
          }

          # Block server fingerprinting
          if ($http_user_agent ~* "(nikto|sqlmap|nmap|masscan)") {
              return 403;
          }

          # Block excessive user agent length
          if (length($http_user_agent) > 1024) {
              return 403;
          }

          # Block empty or suspicious referers
          if ($http_referer ~* "^$|https?://[^/]+") {
              set $xss_attacker true;
          }

        dest: /etc/nginx/waf/rules.conf
        owner: root
        group: root
        mode: '0644'

    # Deploy geo-blocking configuration
    - name: Create geo-blocking configuration
      ansible.builtin.copy:
        content: |
          # Geo-blocking configuration
          # Block requests from high-risk countries (customize based on compliance)

          geo $blocked_countries {
              # High-risk countries (customize based on your compliance requirements)
              RU 1;
              CN 1;
              IR 1;
              KP 1;
              SY 1;
              CU 1;
              VN 1;
              MM 1;
          }

          # Function to check if country is blocked
          map $blocked_countries $geo_block_status {
              default 0;
              1       1;
          }

          # Block request if from blocked country
          if ($geo_block_status) {
              return 403 "Access Denied: Your IP has been geo-blocked";
          }

        dest: /etc/nginx/waf/geo-blocking.conf
        owner: root
        group: root
        mode: '0644'

    # Deploy main site configuration with all security features
    - name: Deploy main site configuration
      ansible.builtin.template:
        src: ../templates/site.conf.j2
        dest: /etc/nginx/sites-available/default
        owner: root
        group: root
        mode: '0644'

    # Create symbolic link for site config
    - name: Link site configuration
      ansible.builtin.file:
        src: /etc/nginx/sites-available/default
        dest: /etc/nginx/sites-enabled/default
        state: link
        force: true

    # Deploy additional security headers script
    - name: Create security headers script
      ansible.builtin.copy:
        content: |
          #!/bin/bash
          # Script to add/update security headers in nginx config

          NGINX_CONF="/etc/nginx/nginx.conf"

          # Add security headers if not present
          if ! grep -q "add_header X-Frame-Options" "$NGINX_CONF"; then
              echo "" >> "$NGINX_CONF"
              echo "# Security Headers" >> "$NGINX_CONF"
              echo 'add_header X-Frame-Options "SAMEORIGIN" always;' >> "$NGINX_CONF"
              echo 'add_header X-Content-Type-Options "nosniff" always;' >> "$NGINX_CONF"
              echo 'add_header X-XSS-Protection "1; mode=block" always;' >> "$NGINX_CONF"
              echo 'add_header Referrer-Policy "strict-origin-when-cross-origin" always;' >> "$NGINX_CONF"
              echo 'add_header Content-Security-Policy "default-src self;" always;' >> "$NGINX_CONF"
              echo 'add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;' >> "$NGINX_CONF"
          fi

          # Test and reload nginx
          nginx -t && systemctl reload nginx || exit 1

        dest: /usr/local/bin/add-security-headers.sh
        owner: root
        group: root
        mode: '0755'

    # Deploy SSL certificate management script
    - name: Create SSL certificate management script
      ansible.builtin.copy:
        content: |
          #!/bin/bash
          # SSL Certificate Management Script

          SSL_DIR="/etc/nginx/ssl"
          CERT_FILE="$SSL_DIR/cert.pem"
          KEY_FILE="$SSL_DIR/key.pem"
          CHAIN_FILE="$SSL_DIR/chain.pem"

          # Check if certificates exist
          if [ ! -f "$CERT_FILE" ] || [ ! -f "$KEY_FILE" ]; then
              echo "SSL certificates not found. Generating self-signed for testing..."

              # Generate self-signed certificate (replace with real certs in production)
              openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
                  -keyout "$KEY_FILE" \
                  -out "$CERT_FILE" \
                  -subj "/C=US/ST=State/L=City/O=Organization/CN=localhost"

              # Create chain file if exists
              if [ -f "$CHAIN_FILE" ]; then
                  cat "$CERT_FILE" "$CHAIN_FILE" > "$SSL_DIR/fullchain.pem"
              fi
          else
              echo "SSL certificates exist. Checking expiration..."

              # Check certificate expiration (30 days warning)
              EXPIRY=$(openssl x509 -enddate -noout -in "$CERT_FILE" | cut -d= -f2)
              EXPIRY_DATE=$(date -d "$EXPIRY" +%s)
              NOW=$(date +%s)
              DAYS_UNTIL_EXPIRY=$(( (EXPIRY_DATE - NOW) / 86400 ))

              if [ $DAYS_UNTIL_EXPIRY -le 30 ]; then
                  echo "Certificate expires in $DAYS_UNTIL_EXPIRY days. Renewal needed."
              else
                  echo "Certificate valid for $DAYS_UNTIL_EXPIRY days."
              fi
          fi

          # Set proper permissions on certificates
          chmod 644 "$CERT_FILE" "$KEY_FILE" "$CHAIN_FILE" 2>/dev/null
          chmod 600 "$KEY_FILE" 2>/dev/null
      when: ssl_dir is defined

    - name: Restart nginx
      ansible.builtin.service:
        name: nginx
        state: restarted
      notify: Check nginx status

    - name: Enable and start nginx
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true
